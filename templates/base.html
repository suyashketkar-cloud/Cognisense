<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cognisense — Multi-Modal Sentiment Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="light">

    <!-- Sidebar toggle button -->
    <button class="toggle-btn" id="sidebarToggle">
    ☰
    </button>

    <!-- Dark/Light mode toggle -->
    <button class="mode-toggle" id="modeToggle">
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>

    <div class="app">

      <!-- ===== SIDEBAR ===== -->
      <aside class="sidebar" id="sidebar">

        <div class="brand-logo">
          <span class="logo-svg">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 18V5"/><path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4"/>
              <path d="M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"/>
              <path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"/>
              <path d="M18 18a4 4 0 0 0 2-7.464"/>
              <path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"/>
              <path d="M6 18a4 4 0 0 1-2-7.464"/>
              <path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"/>
            </svg>
          </span>
          <div class="brand-text-wrap">
            <span class="brand-text">Cognisense</span>
            <p class="brand-sub">Multimodal Sentiment Analyzer</p>
          </div>
        </div>

        <div class="sidebar-divider"></div>

        <nav>
          <span class="nav-label">Navigation</span>
          <a href="/" class="nav-item">
            <span class="nav-icon"><i class="fas fa-home"></i></span>
            <span class="nav-text">Home</span>
          </a>
          <a href="/text" class="nav-item">
            <span class="nav-icon"><i class="fas fa-file-alt"></i></span>
            <span class="nav-text">Text Analyzer</span>
          </a>
          <a href="/audio" class="nav-item">
            <span class="nav-icon"><i class="fas fa-microphone"></i></span>
            <span class="nav-text">Audio Analyzer</span>
          </a>
          <a href="/video" class="nav-item">
            <span class="nav-icon"><i class="fas fa-video"></i></span>
            <span class="nav-text">Video Analyzer</span>
          </a>
          <a href="{{ url_for('image') }}" class="nav-item">
            <span class="nav-icon"><i class="fas fa-image"></i></span>
            <span class="nav-text">Image Analyzer</span>
          </a>
          <a href="{{ url_for('realtime_video_page') }}" class="nav-item">
            <span class="nav-icon"><i class="fas fa-camera"></i></span>
            <span class="nav-text">Real-Time Analyzer</span>
          </a>
          <a href="http://127.0.0.1:5001" class="nav-item">
            <span class="nav-icon"><i class="fas fa-hand-paper"></i></span>
            <span class="nav-text">Palmistry Analyzer</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-status">
            <span class="status-dot"></span>
            <span>AI Engine Online</span>
          </div>
        </div>

      </aside>
      <!-- ===== /SIDEBAR ===== -->

      <main class="content" id="content">
        {% block content %}{% endblock %}
        <!-- Chart container for dynamic results -->
        <div id="chartContainer" class="card" style="margin-top:20px; display:none;">
          <h3>Emotion/Analysis Chart</h3>
          <canvas id="analysisChart" width="400" height="200"></canvas>
        </div>
      </main>

    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chart.js') }}"></script>
  </body>
</html>
